name: AI Fix Loop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  test-and-fix:
    name: Run Tests & AI Fix Loop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # -------------------------------------------------------
      # Step 1: Run all tests and capture output
      # -------------------------------------------------------
      - name: Run API tests
        id: api_tests
        continue-on-error: true
        run: npx vitest run > test-output-api.txt 2>&1

      - name: Run E2E tests
        id: e2e_tests
        continue-on-error: true
        run: npx playwright test > test-output-e2e.txt 2>&1

      # -------------------------------------------------------
      # Step 2: On failure — Gemini CLI analyzes and comments
      # -------------------------------------------------------
      - name: Combine test output
        if: ${{ steps.api_tests.outcome == 'failure' || steps.e2e_tests.outcome == 'failure' }}
        run: |
          echo "=== API Test Results ===" > test-output.txt
          cat test-output-api.txt >> test-output.txt
          echo "" >> test-output.txt
          echo "=== E2E Test Results ===" >> test-output.txt
          cat test-output-e2e.txt >> test-output.txt

          {
            echo "TEST_OUTPUT<<EOF"
            head -c 10000 test-output.txt
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Analyze failures with Gemini CLI
        id: gemini_analysis
        if: ${{ steps.api_tests.outcome == 'failure' || steps.e2e_tests.outcome == 'failure' }}
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |-
            Analyze the following test failures and provide a clear summary of what failed and suggest specific code fixes. Be concise:

            ${{ env.TEST_OUTPUT }}

      - name: Comment on PR with failure analysis
        if: ${{ steps.api_tests.outcome == 'failure' || steps.e2e_tests.outcome == 'failure' }}
        uses: actions/github-script@v7
        env:
          GEMINI_SUMMARY: ${{ steps.gemini_analysis.outputs.summary }}
        with:
          script: |
            const fs = require('fs');

            const analysis = process.env.GEMINI_SUMMARY || 'Could not generate AI analysis.';

            let testOutput = '';
            try {
              testOutput = fs.readFileSync('test-output.txt', 'utf8').slice(0, 3000);
            } catch (e) {}

            const body = `## 🔴 Tests Failed

            ### AI Analysis
            ${analysis}

            ### Test Output (truncated)
            \`\`\`
            ${testOutput}
            \`\`\`

            ---
            @copilot please fix the failing tests based on the analysis above.`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

      # -------------------------------------------------------
      # Step 3: Fail the workflow if tests failed
      # -------------------------------------------------------
      - name: Check test results
        if: ${{ steps.api_tests.outcome == 'failure' || steps.e2e_tests.outcome == 'failure' }}
        run: |
          echo "Tests failed. See PR comment for AI analysis."
          exit 1

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
