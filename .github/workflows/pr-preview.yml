name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  create-blueprint:
    name: Create Blueprint
    runs-on: ubuntu-latest
    outputs:
      blueprint: ${{ steps.blueprint.outputs.result }}
    steps:
      - name: Create Blueprint
        id: blueprint
        uses: actions/github-script@v7
        with:
          script: |
            const blueprint = {
              "$schema": "https://playground.wordpress.net/blueprint-schema.json",
              "preferredVersions": { "php": "8.3", "wp": "latest" },
              "login": true,
              "landingPage": "/wp-admin/options-general.php?page=wc-asia-demo",
              "steps": [
                {
                  "step": "installPlugin",
                  "pluginData": {
                    "resource": "git:directory",
                    "url": `https://github.com/${context.repo.owner}/${context.repo.repo}`,
                    "ref": context.payload.pull_request.head.ref,
                    "refType": "branch",
                    "path": "/plugin"
                  },
                  "options": {
                    "activate": true,
                    "targetFolderName": "wc-asia-demo"
                  }
                },
                {
                  "step": "setSiteOptions",
                  "options": {
                    "blogname": "WC Asia Demo",
                    "blogdescription": "Testing Pipeline Demo",
                    "wc_asia_demo_api_key": "demo-api-key-12345",
                    "wc_asia_demo_greeting": "Hello, WC Asia!"
                  }
                },
                {
                  "step": "runPHP",
                  "code": "<?php\nrequire '/wordpress/wp-load.php';\n$page_id = wp_insert_post(['post_title'=>'Greeting Page','post_content'=>'<!-- wp:shortcode -->[wc_asia_greeting]<!-- /wp:shortcode -->','post_status'=>'publish','post_type'=>'page']);\nupdate_option('show_on_front','page');\nupdate_option('page_on_front',$page_id);\n"
                }
              ]
            };
            return JSON.stringify(blueprint);
          result-encoding: string

  preview:
    needs: create-blueprint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Post Playground Preview Button
        uses: WordPress/action-wp-playground-pr-preview@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mode: 'append-to-description'
          blueprint: ${{ needs.create-blueprint.outputs.blueprint }}
